openapi: 3.1.0
info:
  title: MyBox CPO API
  version: 1.0.0
  description: Mini fleet management platform for EV charging stations
servers:
  - url: http://localhost:8080
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  time: { type: string, format: date-time }
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: Prometheus exposition format
          content:
            text/plain:
              schema: { type: string }
  /api/login:
    post:
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200":
          description: JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  type: { type: string, example: Bearer }
        "401":
          description: Invalid credentials
  /api/events:
    get:
      summary: SSE stream of real-time events
      responses:
        "200":
          description: Server-sent event stream
          content:
            text/event-stream:
              schema: { type: string }
  /api/stations:
    get:
      summary: List all stations
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Array of stations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Station" }
        "401":
          description: Unauthorized
  /api/stations/{id}:
    get:
      summary: Get station by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Station detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Station" }
        "404":
          description: Station not found
        "401":
          description: Unauthorized
  /api/stations/{id}/sessions:
    get:
      summary: List charging sessions for a station
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
      responses:
        "200":
          description: Array of sessions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChargingSession" }
        "401":
          description: Unauthorized
  /api/stations/{id}/meter-values:
    get:
      summary: List meter values for a station
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: minutes
          in: query
          schema: { type: integer, default: 30 }
        - name: limit
          in: query
          schema: { type: integer, default: 1000 }
      responses:
        "200":
          description: Array of meter values
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MeterValue" }
        "401":
          description: Unauthorized
  /api/stations/{id}/start:
    post:
      summary: Start charging on a station
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "202":
          description: Command accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  station_id: { type: string }
                  transaction_id: { type: string }
                  command_id: { type: string }
                  command_status: { type: string }
        "404":
          description: Station not found
        "401":
          description: Unauthorized
  /api/stations/{id}/stop:
    post:
      summary: Stop charging on a station
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "202":
          description: Command accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  station_id: { type: string }
                  status: { type: string }
                  command_id: { type: string }
                  command_status: { type: string }
        "404":
          description: Station not found
        "401":
          description: Unauthorized
  /api/pricing:
    get:
      summary: Get pricing settings
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Pricing settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PricingSettings" }
        "401":
          description: Unauthorized
    put:
      summary: Update pricing settings
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PricingSettingsInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Station:
      type: object
      properties:
        id: { type: string }
        max_power_kw: { type: number }
        status:
          type: string
          enum: [Available, Preparing, Charging, Finishing, Faulted, Offline]
        last_seen_at: { type: string, nullable: true }
        current_power_kw: { type: number }
        current_meter_wh: { type: number }
        active_transaction_id: { type: string, nullable: true }
        updated_at: { type: string, format: date-time }
    ChargingSession:
      type: object
      properties:
        id: { type: string }
        transaction_id: { type: string }
        station_id: { type: string }
        start_time: { type: string, format: date-time }
        end_time: { type: string, format: date-time, nullable: true }
        start_meter_wh: { type: number }
        end_meter_wh: { type: number, nullable: true }
        total_kwh: { type: number, nullable: true }
        total_cost: { type: number, nullable: true }
        price_per_kwh: { type: number, nullable: true }
        pricing_tariff: { type: string, nullable: true }
        station_power_class: { type: string, nullable: true }
    MeterValue:
      type: object
      properties:
        station_id: { type: string }
        transaction_id: { type: string, nullable: true }
        measured_at: { type: string, format: date-time }
        power_kw: { type: number }
        meter_wh: { type: number }
    PricingSettings:
      type: object
      properties:
        peak_price_per_kwh: { type: number }
        offpeak_price_per_kwh: { type: number }
        peak_start_hour: { type: integer }
        peak_end_hour: { type: integer }
        dc_multiplier: { type: number }
        updated_at: { type: string, format: date-time }
    PricingSettingsInput:
      type: object
      properties:
        peak_price_per_kwh: { type: number }
        offpeak_price_per_kwh: { type: number }
        peak_start_hour: { type: integer }
        peak_end_hour: { type: integer }
        dc_multiplier: { type: number }
